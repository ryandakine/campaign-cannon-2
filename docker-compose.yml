services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - app-data:/app/data
      - ./campaigns:/app/campaigns
    restart: unless-stopped

  mcp-server:
    build: .
    command: ["python", "-m", "src.mcp_server.server"]
    env_file: .env
    volumes:
      - app-data:/app/data
    restart: unless-stopped

  dev:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    volumes:
      - .:/app
      - app-data:/app/data
    command: ["python", "run.py"]

  test:
    build: .
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///:memory:
    volumes:
      - .:/app

volumes:
  app-data:
